<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eco-Logística Verde</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen">
    
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border-t-8 border-green-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-green-700 mb-2">🌱 Eco-Logística</h1>
            <p class="text-gray-500 text-sm">Logística Eco</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Seleccione su perfil (Rol)</label>
                <select id="rolSelect" class="w-full p-3 border border-gray-300 rounded-md focus:ring-green-500 focus:border-green-500 bg-gray-50">
                    <option value="fichas.html">📄 Agente de admisión Eco</option>
                    <option value="acopio.html">📦 Jefe de acopio Eco</option>
                    <option value="flota.html">🚚 Coordinador / Técnico de flota Eco</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Clave de acceso</label>
                <input type="password" id="claveInput" required class="w-full p-3 border border-gray-300 rounded-md focus:ring-green-500 focus:border-green-500 bg-gray-50" placeholder="Ingrese su clave asignada">
            </div>

            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-md hover:bg-green-700 transition shadow-lg text-lg">
                Ingresar
            </button>
        </form>

        <div id="loginError" class="mt-4 hidden p-3 bg-red-100 border border-red-400 text-red-800 rounded text-sm text-center font-bold">
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const clave = document.getElementById('claveInput').value;
            const destino = document.getElementById('rolSelect').value;

            // Validación de seguridad (Simulando la validación del backend)
            if(clave === '1094948414') {
                // Redirigir a la pantalla del rol seleccionado
                window.location.href = destino;
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.innerText = "❌ Clave incorrecta. Acceso denegado.";
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
